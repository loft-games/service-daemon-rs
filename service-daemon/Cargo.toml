[package]
name = "service-daemon"
version = "0.1.0"
edition = "2024"

[features]
default = []
macros = []

[dependencies]
service-daemon-macro = { path = "../service-daemon-macro" }
tokio = { version = "1.40", features = ["full", "tracing"] }
tokio-cron-scheduler = "0.13"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender = "0.2"
anyhow = "1.0"
thiserror = "2.0"
dashmap = "6.1"
once_cell = "1.20"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
futures = "0.3"
linkme = "0.3"
uuid = { version = "1.0", features = ["v4"] }
